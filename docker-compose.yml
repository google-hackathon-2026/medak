services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379

  demo-dispatch:
    build: ./backend
    command: uv run uvicorn demo_dispatch:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
